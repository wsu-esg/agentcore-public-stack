name: "6. Seed Bootstrap Data"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Suppress repeated config dumps from load-env.sh in CI logs
  LOAD_ENV_QUIET: true

concurrency:
  group: bootstrap-data-seeding-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seed:
    name: Seed Bootstrap Data
    runs-on: ubuntu-24.04

    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      # AWS credentials
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Auth provider config — non-sensitive from variables
      SEED_AUTH_PROVIDER_ID: ${{ vars.SEED_AUTH_PROVIDER_ID }}
      SEED_AUTH_DISPLAY_NAME: ${{ vars.SEED_AUTH_DISPLAY_NAME }}
      SEED_AUTH_ISSUER_URL: ${{ vars.SEED_AUTH_ISSUER_URL }}
      SEED_AUTH_BUTTON_COLOR: ${{ vars.SEED_AUTH_BUTTON_COLOR }}

      # Auth provider config — client ID is a public identifier (non-sensitive)
      SEED_AUTH_CLIENT_ID: ${{ vars.SEED_AUTH_CLIENT_ID }}
      SEED_AUTH_CLIENT_SECRET: ${{ secrets.SEED_AUTH_CLIENT_SECRET }}

      # System admin JWT role mapping
      SEED_ADMIN_JWT_ROLE: ${{ vars.SEED_ADMIN_JWT_ROLE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-BootstrapSeed
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install dependencies
        run: |
          bash scripts/stack-bootstrap/install.sh

      - name: Run bootstrap data seeding
        run: |
          bash scripts/stack-bootstrap/seed.sh

      - name: Generate summary
        if: always()
        run: |
          source scripts/common/summary.sh

          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
          else
            STATUS="failure"
          fi

          write_workflow_header "Bootstrap Data Seeding" "$STATUS" "BootstrapStack"

          if [ "$STATUS" = "failure" ]; then
            write_failure_summary "Bootstrap Seed" "1" "Seeding failed — check logs above"
          fi
