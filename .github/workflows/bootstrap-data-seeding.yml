name: "Step 7 — Seed Bootstrap Data"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: string

concurrency:
  group: bootstrap-data-seeding-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seed:
    name: Seed Bootstrap Data
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      # AWS credentials
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Auth provider config — non-sensitive from variables
      SEED_AUTH_PROVIDER_ID: ${{ vars.SEED_AUTH_PROVIDER_ID }}
      SEED_AUTH_DISPLAY_NAME: ${{ vars.SEED_AUTH_DISPLAY_NAME }}
      SEED_AUTH_ISSUER_URL: ${{ vars.SEED_AUTH_ISSUER_URL }}
      SEED_AUTH_BUTTON_COLOR: ${{ vars.SEED_AUTH_BUTTON_COLOR }}

      # Auth provider config — client ID is a public identifier (non-sensitive)
      SEED_AUTH_CLIENT_ID: ${{ vars.SEED_AUTH_CLIENT_ID }}
      SEED_AUTH_CLIENT_SECRET: ${{ secrets.SEED_AUTH_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-BootstrapSeed
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install dependencies
        run: |
          bash scripts/stack-bootstrap/install.sh

      - name: Run bootstrap data seeding
        run: |
          bash scripts/stack-bootstrap/seed.sh

      - name: Seeding summary
        if: success()
        run: |
          echo "## Bootstrap Data Seeding Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${CDK_AWS_REGION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: ${CDK_PROJECT_PREFIX}" >> $GITHUB_STEP_SUMMARY
