name: "5. Deploy Frontend (CloudFront)"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - 'infrastructure/lib/frontend-stack.ts'
      - 'infrastructure/lib/config.ts'
      - 'infrastructure/bin/infrastructure.ts'
      - 'scripts/stack-frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - 'infrastructure/lib/frontend-stack.ts'
      - 'infrastructure/lib/config.ts'
      - 'infrastructure/bin/infrastructure.ts'
      - 'scripts/stack-frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'
      skip_deploy:
        description: 'Skip deployment'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Build and Deploy Configuration (non-sensitive, repository-level)
  BUILD_CONFIG: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'development' }}
  CDK_REQUIRE_APPROVAL: never
  WAIT_FOR_INVALIDATION: false
  # Suppress repeated config dumps from load-env.sh in CI logs
  LOAD_ENV_QUIET: true

# Ensure only one deployment runs at a time
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-stack-dependencies:
    name: Check Stack Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run stack dependency tests
        run: |
          bash scripts/common/test-stack-dependencies.sh

  install:
    name: Install Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore frontend node_modules cache
        id: cache-frontend
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

      - name: Restore CDK node_modules cache
        id: cache-infrastructure
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Install system dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true' || steps.cache-infrastructure.outputs.cache-hit != 'true'
        run: |
          bash scripts/common/install-deps.sh

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true' || steps.cache-infrastructure.outputs.cache-hit != 'true'
        run: |
          bash scripts/stack-frontend/install.sh

      - name: Save frontend node_modules cache
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

      - name: Save CDK node_modules cache
        if: steps.cache-infrastructure.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-24.04
    needs: [install, check-stack-dependencies]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore frontend node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

      - name: Build Frontend application
        id: build-app
        run: |
          bash scripts/stack-frontend/build.sh

      - name: Upload Frontend build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-build
          path: frontend/ai.client/dist/
          retention-days: 7

      - name: Save Frontend build cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: frontend/ai.client/dist
          key: frontend-build-${{ hashFiles('frontend/ai.client/src/**', 'frontend/ai.client/angular.json', 'frontend/ai.client/tsconfig.json') }}

  build-cdk:
    name: Build CDK
    runs-on: ubuntu-24.04
    needs: [install, check-stack-dependencies]
    if: github.event_name != 'pull_request'
    outputs:
      app-version: ${{ steps.read-version.outputs.APP_VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read VERSION file
        id: read-version
        run: |
          APP_VERSION=$(tr -d '[:space:]' < VERSION)
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "App version: ${APP_VERSION}"

      - name: Restore CDK node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Build CDK
        run: |
          bash scripts/stack-frontend/build-cdk.sh

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-24.04
    needs: install
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore frontend node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

      - name: Run Frontend tests
        id: run-tests
        run: |
          bash scripts/stack-frontend/test.sh

      - name: Upload Frontend test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-test-results
          path: frontend/ai.client/coverage/
          retention-days: 7
          if-no-files-found: ignore

  synth-cdk:
    name: Synthesize CDK
    runs-on: ubuntu-24.04
    needs: build-cdk
    if: github.event_name != 'pull_request'
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_PRODUCTION: ${{ vars.CDK_PRODUCTION }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_CORS_ORIGINS: ${{ vars.CDK_CORS_ORIGINS }}
      CDK_FRONTEND_ENABLED: ${{ vars.CDK_FRONTEND_ENABLED }}
      CDK_FRONTEND_CLOUDFRONT_PRICE_CLASS: ${{ vars.CDK_FRONTEND_CLOUDFRONT_PRICE_CLASS }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_FRONTEND_CERTIFICATE_ARN: ${{ vars.CDK_FRONTEND_CERTIFICATE_ARN }}
      CDK_FRONTEND_BUCKET_NAME: ${{ vars.CDK_FRONTEND_BUCKET_NAME }}
      CDK_APP_VERSION: ${{ needs.build-cdk.outputs.app-version }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore CDK node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-Frontend-Synth
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Synthesize CloudFormation template
        run: |
          bash scripts/stack-frontend/synth.sh

      - name: Upload synthesized templates
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-cdk-synth
          path: infrastructure/cdk.out/
          retention-days: 7

  test-cdk:
    name: Test CDK
    runs-on: ubuntu-24.04
    needs: synth-cdk
    if: ${{ github.event_name != 'pull_request' && github.event.inputs.skip_tests != 'true' }}
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore CDK node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Download synthesized templates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-cdk-synth
          path: infrastructure/cdk.out/

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-Frontend-Test
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Validate CloudFormation template
        id: run-tests
        run: |
          bash scripts/stack-frontend/test-cdk.sh

  deploy-infrastructure:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-24.04
    needs: [build-cdk, test-cdk]
    if: |
      always() && !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_deploy != 'true')
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_PRODUCTION: ${{ vars.CDK_PRODUCTION }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_CORS_ORIGINS: ${{ vars.CDK_CORS_ORIGINS }}
      CDK_FRONTEND_ENABLED: ${{ vars.CDK_FRONTEND_ENABLED }}
      CDK_FRONTEND_CLOUDFRONT_PRICE_CLASS: ${{ vars.CDK_FRONTEND_CLOUDFRONT_PRICE_CLASS }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_FRONTEND_CERTIFICATE_ARN: ${{ vars.CDK_FRONTEND_CERTIFICATE_ARN }}
      CDK_FRONTEND_BUCKET_NAME: ${{ vars.CDK_FRONTEND_BUCKET_NAME }}
      CDK_APP_VERSION: ${{ needs.build-cdk.outputs.app-version }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore CDK node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Download synthesized templates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-cdk-synth
          path: infrastructure/cdk.out/
      
      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-Frontend-CDK
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
      
      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh
      
      - name: Deploy infrastructure
        run: |
          bash scripts/stack-frontend/deploy-cdk.sh
      
      - name: Upload stack outputs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-cdk-outputs
          path: infrastructure/frontend-outputs.json
          retention-days: 30

  deploy-assets:
    name: Deploy Frontend Assets
    runs-on: ubuntu-24.04
    needs: [build-frontend, test-frontend, deploy-infrastructure]
    if: |
      always() && !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_deploy != 'true')
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_PRODUCTION: ${{ vars.CDK_PRODUCTION }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_FRONTEND_BUCKET_NAME: ${{ vars.CDK_FRONTEND_BUCKET_NAME }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2      
      
      - name: Download Frontend build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: frontend/ai.client/dist/

      - name: Download CDK outputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-cdk-outputs
          path: infrastructure/

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-Frontend-Assets
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
      
      - name: Deploy Frontend assets
        id: deploy-assets
        run: |
          bash scripts/stack-frontend/deploy-assets.sh
      
      - name: Generate summary
        if: always()
        run: |
          source scripts/common/summary.sh

          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
          else
            STATUS="failure"
          fi

          # --- Workflow header (once for the entire workflow) ---
          write_workflow_header "Frontend" "$STATUS" "FrontendStack"

          # --- Stack outputs or failure details ---
          if [ "$STATUS" = "success" ]; then
            write_cdk_outputs_table "infrastructure/frontend-outputs.json"
          else
            write_failure_summary "Deploy Assets" "1" "Asset deployment failed — check logs above"
          fi
