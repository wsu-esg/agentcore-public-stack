name: "3. Deploy Inference API (AgentCore Runtime)"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/src/apis/inference_api/**'
      - 'backend/src/apis/shared/**'
      - 'backend/src/agents/**'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'
      - 'backend/Dockerfile.inference-api'
      - 'infrastructure/lib/inference-api-stack.ts'
      - 'scripts/stack-inference-api/**'
      - '.github/workflows/inference-api.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/src/apis/inference_api/**'
      - 'backend/src/apis/shared/**'
      - 'backend/src/agents/**'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'
      - 'backend/Dockerfile.inference-api'
      - 'infrastructure/lib/inference-api-stack.ts'
      - 'scripts/stack-inference-api/**'
      - '.github/workflows/inference-api.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'
      skip_deploy:
        description: 'Skip deployment'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  # Build and Deploy Configuration (non-sensitive, repository-level)
  CDK_REQUIRE_APPROVAL: never
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Suppress repeated config dumps from load-env.sh in CI logs
  LOAD_ENV_QUIET: true

# Ensure only one deployment runs at a time
concurrency:
  group: inference-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-stack-dependencies:
    name: Check Stack Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run stack dependency tests
        run: |
          bash scripts/common/test-stack-dependencies.sh

  install:
    name: Install Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Python packages cache
        id: cache-python
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/uv
            backend/.venv
          key: uv-packages-${{ hashFiles('backend/uv.lock') }}

      - name: Restore node_modules cache
        id: cache-infrastructure
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Install system dependencies
        if: steps.cache-python.outputs.cache-hit != 'true' || steps.cache-infrastructure.outputs.cache-hit != 'true'
        run: |
          bash scripts/common/install-deps.sh

      - name: Install inference-api dependencies
        if: steps.cache-python.outputs.cache-hit != 'true' || steps.cache-infrastructure.outputs.cache-hit != 'true'
        run: |
          bash scripts/stack-inference-api/install.sh

      - name: Save Python packages cache
        if: steps.cache-python.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/uv
            backend/.venv
          key: uv-packages-${{ hashFiles('backend/uv.lock') }}

      - name: Save node_modules cache
        if: steps.cache-infrastructure.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-24.04-arm
    needs: [install, check-stack-dependencies]
    if: github.event_name != 'pull_request'
    
    # Select environment to get project prefix for image naming
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    outputs:
      image-tag: ${{ steps.set-tag.outputs.IMAGE_TAG }}
      app-version: ${{ steps.read-version.outputs.APP_VERSION }}
    
    env:
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image tag
        id: set-tag
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Building with tag: ${IMAGE_TAG}"

      - name: Read VERSION file
        id: read-version
        run: |
          APP_VERSION=$(tr -d '[:space:]' < VERSION)
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "App version: ${APP_VERSION}"
      
      # - name: Set up QEMU for ARM64 emulation
      #   uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      #   with:
      #     platforms: linux/arm64
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and export Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: backend/Dockerfile.inference-api
          platforms: linux/arm64
          tags: |
            ${{ env.CDK_PROJECT_PREFIX }}-inference-api:${{ steps.set-tag.outputs.IMAGE_TAG }}
            ${{ env.CDK_PROJECT_PREFIX }}-inference-api:${{ steps.read-version.outputs.APP_VERSION }}
          build-args: |
            APP_VERSION=${{ steps.read-version.outputs.APP_VERSION }}
          outputs: type=docker,dest=${{ runner.temp }}/inference-api-image.tar
      
      - name: Capture image size
        id: image-size
        run: |
          IMAGE_SIZE=$(stat --format='%s' "${{ runner.temp }}/inference-api-image.tar" 2>/dev/null || stat -f '%z' "${{ runner.temp }}/inference-api-image.tar" 2>/dev/null || echo "0")
          echo "IMAGE_SIZE=${IMAGE_SIZE}" >> $GITHUB_OUTPUT
          echo "Image size: ${IMAGE_SIZE} bytes"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: inference-api-docker-image
          path: ${{ runner.temp }}/inference-api-image.tar
          retention-days: 1

  build-cdk:
    name: Build CDK
    runs-on: ubuntu-24.04
    needs: [install, check-stack-dependencies]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Build CDK
        run: |
          bash scripts/stack-inference-api/build-cdk.sh

  test-docker:
    name: Test Docker Image
    runs-on: ubuntu-24.04-arm
    needs: build-docker
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    
    # Select environment to get project prefix for image naming
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    env:
      IMAGE_TAG: ${{ needs.build-docker.outputs.image-tag }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Download Docker image artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: inference-api-docker-image
          path: ${{ runner.temp }}
      
      - name: Load Docker image
        run: |
          docker load --input ${{ runner.temp }}/inference-api-image.tar
          docker image ls -a
      
      - name: Test Docker image
        id: run-tests
        run: |
          bash scripts/stack-inference-api/test-docker.sh

  test-python:
    name: Test Python Code
    runs-on: ubuntu-24.04
    needs: install
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore Python packages cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/uv
            backend/.venv
          key: uv-packages-${{ hashFiles('backend/uv.lock') }}

      - name: Run Python tests
        id: run-tests
        run: |
          bash scripts/stack-inference-api/test.sh

  synth-cdk:
    name: Synthesize CDK
    runs-on: ubuntu-24.04
    needs: [build-cdk, build-docker]
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_INFERENCE_API_ENABLED: ${{ vars.CDK_INFERENCE_API_ENABLED }}
      CDK_INFERENCE_API_CPU: ${{ vars.CDK_INFERENCE_API_CPU }}
      CDK_INFERENCE_API_MEMORY: ${{ vars.CDK_INFERENCE_API_MEMORY }}
      CDK_INFERENCE_API_DESIRED_COUNT: ${{ vars.CDK_INFERENCE_API_DESIRED_COUNT }}
      CDK_INFERENCE_API_MAX_CAPACITY: ${{ vars.CDK_INFERENCE_API_MAX_CAPACITY }}
      ENV_INFERENCE_API_LOG_LEVEL: ${{ vars.ENV_INFERENCE_API_LOG_LEVEL }}
      ENV_INFERENCE_API_CORS_ORIGINS: ${{ vars.ENV_INFERENCE_API_CORS_ORIGINS }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_APP_VERSION: ${{ needs.build-docker.outputs.app-version }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-InferenceApi-Synth
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Synthesize CloudFormation template
        run: |
          bash scripts/stack-inference-api/synth.sh

      - name: Upload synthesized templates
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: inference-api-cdk-synth
          path: infrastructure/cdk.out/
          retention-days: 7

  test-cdk:
    name: Test CDK
    runs-on: ubuntu-24.04
    needs: synth-cdk
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Download synthesized templates
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: inference-api-cdk-synth
          path: infrastructure/cdk.out/

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-InferenceApi-Test
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Validate CloudFormation template
        id: run-tests
        run: |
          bash scripts/stack-inference-api/test-cdk.sh

  push-to-ecr:
    name: Push Docker Image to ECR
    runs-on: ubuntu-24.04
    needs: [build-docker, test-docker, test-python]
    if: |
      always() && !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      github.event_name != 'pull_request'
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    outputs:
      image-tag: ${{ needs.build-docker.outputs.image-tag }}
      app-version: ${{ needs.build-docker.outputs.app-version }}
    
    env:
      IMAGE_TAG: ${{ needs.build-docker.outputs.image-tag }}
      APP_VERSION: ${{ needs.build-docker.outputs.app-version }}
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Download Docker image artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: inference-api-docker-image
          path: ${{ runner.temp }}
      
      - name: Load Docker image
        run: |
          docker load --input ${{ runner.temp }}/inference-api-image.tar
          docker image ls -a
      
      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-InferenceApi-ECR
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
      
      - name: Push to ECR
        id: push-ecr
        run: |
          bash scripts/stack-inference-api/push-to-ecr.sh

  deploy-infrastructure:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-24.04
    needs: [test-cdk, push-to-ecr]
    if: |
      always() && !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_deploy != 'true')
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    env:
      IMAGE_TAG: ${{ needs.push-to-ecr.outputs.image-tag }}
      CDK_APP_VERSION: ${{ needs.push-to-ecr.outputs.app-version }}
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_INFERENCE_API_ENABLED: ${{ vars.CDK_INFERENCE_API_ENABLED }}
      CDK_INFERENCE_API_CPU: ${{ vars.CDK_INFERENCE_API_CPU }}
      CDK_INFERENCE_API_MEMORY: ${{ vars.CDK_INFERENCE_API_MEMORY }}
      CDK_INFERENCE_API_DESIRED_COUNT: ${{ vars.CDK_INFERENCE_API_DESIRED_COUNT }}
      CDK_INFERENCE_API_MAX_CAPACITY: ${{ vars.CDK_INFERENCE_API_MAX_CAPACITY }}
      ENV_INFERENCE_API_LOG_LEVEL: ${{ vars.ENV_INFERENCE_API_LOG_LEVEL }}
      ENV_INFERENCE_API_CORS_ORIGINS: ${{ vars.ENV_INFERENCE_API_CORS_ORIGINS }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Download synthesized templates
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: inference-api-cdk-synth
          path: infrastructure/cdk.out/
      
      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-InferenceApi-CDK
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}     
        
      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh
          
      - name: Deploy infrastructure
        run: |
          bash scripts/stack-inference-api/deploy.sh
      
      - name: Tag image as latest
        run: |
          bash scripts/stack-inference-api/tag-latest.sh
     
      - name: Upload stack outputs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: inference-api-deployment-outputs
          path: |
            cdk-outputs-inference-api.json
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          source scripts/common/summary.sh

          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
          else
            STATUS="failure"
          fi

          write_workflow_header "Inference API" "$STATUS" "InferenceApiStack"

          if [ "$STATUS" = "success" ]; then
            if [ -f cdk-outputs-inference-api.json ]; then
              write_cdk_outputs_table "cdk-outputs-inference-api.json"
            fi
          else
            write_failure_summary "CDK Deploy" "1" "Deployment failed — check logs above"
          fi
