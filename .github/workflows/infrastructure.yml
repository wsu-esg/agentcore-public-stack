name: "1. Deploy Infrastructure (VPC, ALB, ECS)"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'infrastructure/lib/infrastructure-stack.ts'
      - 'infrastructure/lib/config.ts'
      - 'infrastructure/bin/infrastructure.ts'
      - 'infrastructure/cdk.json'
      - 'infrastructure/cdk.context.json'
      - 'infrastructure/package.json'
      - 'scripts/stack-infrastructure/**'
      - '.github/workflows/infrastructure.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'infrastructure/lib/infrastructure-stack.ts'
      - 'infrastructure/lib/config.ts'
      - 'infrastructure/bin/infrastructure.ts'
      - 'infrastructure/cdk.json'
      - 'infrastructure/cdk.context.json'
      - 'infrastructure/package.json'
      - 'scripts/stack-infrastructure/**'
      - '.github/workflows/infrastructure.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'
      skip_deploy:
        description: 'Skip deployment'
        required: false
        default: 'false'

permissions:
  contents: read

env:
  # Build and Deploy Configuration (non-sensitive, repository-level)
  CDK_REQUIRE_APPROVAL: never
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Suppress repeated config dumps from load-env.sh in CI logs
  LOAD_ENV_QUIET: true

# Ensure only one deployment runs at a time
concurrency:
  group: infrastructure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-stack-dependencies:
    name: Check Stack Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run stack dependency tests
        run: |
          bash scripts/common/test-stack-dependencies.sh

  install:
    name: Install Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        id: cache-infrastructure
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Install system dependencies
        if: steps.cache-infrastructure.outputs.cache-hit != 'true'
        run: |
          bash scripts/common/install-deps.sh

      - name: Install CDK dependencies
        if: steps.cache-infrastructure.outputs.cache-hit != 'true'
        run: |
          bash scripts/stack-infrastructure/install.sh

      - name: Save node_modules cache
        if: steps.cache-infrastructure.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

  build:
    name: Build CDK Code
    runs-on: ubuntu-24.04
    needs: [install, check-stack-dependencies]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Build CDK
        id: build-cdk
        run: |
          bash scripts/stack-infrastructure/build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: infrastructure-cdk-build
          path: |
            infrastructure/lib/**/*.js
            infrastructure/lib/**/*.d.ts
            infrastructure/bin/**/*.js
            infrastructure/bin/**/*.d.ts
          retention-days: 1

  synth:
    name: Synthesize CloudFormation Template
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name != 'pull_request'
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_HOSTED_ZONE_DOMAIN: ${{ vars.CDK_HOSTED_ZONE_DOMAIN }}
      CDK_ALB_SUBDOMAIN: ${{ vars.CDK_ALB_SUBDOMAIN }}
      CDK_CERTIFICATE_ARN: ${{ vars.CDK_CERTIFICATE_ARN }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_FILE_UPLOAD_CORS_ORIGINS: ${{ vars.CDK_FILE_UPLOAD_CORS_ORIGINS }}
      CDK_FILE_UPLOAD_MAX_SIZE_MB: ${{ vars.CDK_FILE_UPLOAD_MAX_SIZE_MB }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: infrastructure-cdk-build
          path: infrastructure

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-InfrastructureSynth
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Synthesize CloudFormation template
        id: synth-cfn
        run: |
          bash scripts/stack-infrastructure/synth.sh

      - name: Upload synthesized templates
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: infrastructure-cdk-synth
          path: infrastructure/cdk.out/
          retention-days: 7

  test:
    name: Validate CloudFormation Template
    runs-on: ubuntu-24.04
    needs: synth
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    permissions:
      id-token: write
      contents: read
    
    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_HOSTED_ZONE_DOMAIN: ${{ vars.CDK_HOSTED_ZONE_DOMAIN }}
      CDK_ALB_SUBDOMAIN: ${{ vars.CDK_ALB_SUBDOMAIN }}
      CDK_CERTIFICATE_ARN: ${{ vars.CDK_CERTIFICATE_ARN }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_FILE_UPLOAD_CORS_ORIGINS: ${{ vars.CDK_FILE_UPLOAD_CORS_ORIGINS }}
      CDK_FILE_UPLOAD_MAX_SIZE_MB: ${{ vars.CDK_FILE_UPLOAD_MAX_SIZE_MB }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: infrastructure-cdk-build
          path: infrastructure

      - name: Download synthesized templates
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: infrastructure-cdk-synth
          path: infrastructure/cdk.out/

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-InfrastructureTest
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Run CDK diff to validate template
        id: run-tests
        run: |
          bash scripts/stack-infrastructure/test.sh

  deploy:
    name: Deploy Infrastructure Stack
    runs-on: ubuntu-24.04
    needs: test
    if: |
      always() && !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_deploy != 'true')    
    
    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}
    
    # Use OIDC for secure AWS authentication
    permissions:
      id-token: write
      contents: read
    
    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_HOSTED_ZONE_DOMAIN: ${{ vars.CDK_HOSTED_ZONE_DOMAIN }}
      CDK_ALB_SUBDOMAIN: ${{ vars.CDK_ALB_SUBDOMAIN }}
      CDK_CERTIFICATE_ARN: ${{ vars.CDK_CERTIFICATE_ARN }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_FILE_UPLOAD_CORS_ORIGINS: ${{ vars.CDK_FILE_UPLOAD_CORS_ORIGINS }}
      CDK_FILE_UPLOAD_MAX_SIZE_MB: ${{ vars.CDK_FILE_UPLOAD_MAX_SIZE_MB }}
      CDK_APP_API_DESIRED_COUNT: ${{ vars.CDK_APP_API_DESIRED_COUNT }}
      CDK_APP_API_MAX_CAPACITY: ${{ vars.CDK_APP_API_MAX_CAPACITY }}
      CDK_APP_API_CPU: ${{ vars.CDK_APP_API_CPU }}
      CDK_APP_API_MEMORY: ${{ vars.CDK_APP_API_MEMORY }}
      CDK_INFERENCE_API_DESIRED_COUNT: ${{ vars.CDK_INFERENCE_API_DESIRED_COUNT }}
      CDK_INFERENCE_API_MAX_CAPACITY: ${{ vars.CDK_INFERENCE_API_MAX_CAPACITY }}
      CDK_INFERENCE_API_CPU: ${{ vars.CDK_INFERENCE_API_CPU }}
      CDK_INFERENCE_API_MEMORY: ${{ vars.CDK_INFERENCE_API_MEMORY }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: infrastructure-cdk-build
          path: infrastructure

      - name: Download synthesized templates
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: infrastructure-cdk-synth
          path: infrastructure/cdk.out/

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-InfrastructureDeploy
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        
      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Deploy infrastructure
        run: |
          bash scripts/stack-infrastructure/deploy.sh

      - name: Upload stack outputs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: infrastructure-outputs
          path: infrastructure/infrastructure-outputs.json
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          source scripts/common/summary.sh

          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
          else
            STATUS="failure"
          fi

          # --- Workflow header (once for the entire workflow) ---
          write_workflow_header "Infrastructure" "$STATUS" "InfrastructureStack"

          # --- Stack outputs or failure details ---
          if [ "$STATUS" = "success" ]; then
            write_cdk_outputs_table "infrastructure/infrastructure-outputs.json"
          else
            write_failure_summary "CDK Deploy" "1" "Deployment failed — check logs above"
          fi
