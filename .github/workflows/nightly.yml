  summary:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, deploy-infrastructure, deploy-app-api, deploy-inference-api, deploy-rag-ingestion, deploy-frontend, deploy-gateway, smoke-test, teardown, analyze-coverage, ai-coverage-analysis, mv-deploy-infrastructure, mv-main-rag-ingestion, mv-main-inference-api, mv-main-app-api, mv-main-frontend, mv-main-gateway, mv-deploy-infrastructure-develop, mv-deploy-rag-ingestion, mv-deploy-inference-api, mv-deploy-app-api, mv-deploy-frontend, mv-deploy-gateway, mv-smoke-test, mv-teardown]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Generate nightly summary
        run: |
          source scripts/common/summary.sh

          # Determine aggregate status from all job outcomes
          AGGREGATE="success"
          for outcome in \
            "${{ needs.test-backend.result }}" \
            "${{ needs.test-frontend.result }}" \
            "${{ needs.deploy-infrastructure.result }}" \
            "${{ needs.deploy-app-api.result }}" \
            "${{ needs.deploy-inference-api.result }}" \
            "${{ needs.deploy-rag-ingestion.result }}" \
            "${{ needs.deploy-frontend.result }}" \
            "${{ needs.deploy-gateway.result }}" \
            "${{ needs.smoke-test.result }}" \
            "${{ needs.teardown.result }}" \
            "${{ needs.analyze-coverage.result }}" \
            "${{ needs.ai-coverage-analysis.result }}" \
            "${{ needs.mv-deploy-infrastructure.result }}" \
            "${{ needs.mv-main-rag-ingestion.result }}" \
            "${{ needs.mv-main-inference-api.result }}" \
            "${{ needs.mv-main-app-api.result }}" \
            "${{ needs.mv-main-frontend.result }}" \
            "${{ needs.mv-main-gateway.result }}" \
            "${{ needs.mv-deploy-infrastructure-develop.result }}" \
            "${{ needs.mv-deploy-rag-ingestion.result }}" \
            "${{ needs.mv-deploy-inference-api.result }}" \
            "${{ needs.mv-deploy-app-api.result }}" \
            "${{ needs.mv-deploy-frontend.result }}" \
            "${{ needs.mv-deploy-gateway.result }}" \
            "${{ needs.mv-smoke-test.result }}" \
            "${{ needs.mv-teardown.result }}"; do
            case "$outcome" in
              failure) AGGREGATE="failure"; break ;;
              skipped) [ "$AGGREGATE" != "failure" ] && AGGREGATE="partial" ;;
            esac
          done

          write_workflow_header "Nightly Build & Test" "$AGGREGATE"

          # Helper to map GitHub Actions result to our status format
          map_status() {
            case "$1" in
              success) echo "success" ;;
              failure) echo "failure" ;;
              skipped|cancelled) echo "skipped" ;;
              *) echo "skipped" ;;
            esac
          }

          write_nightly_summary \
            "Test Backend|$(map_status "${{ needs.test-backend.result }}")|${{ needs.test-backend.outputs.duration || '0' }}" \
            "Test Frontend|$(map_status "${{ needs.test-frontend.result }}")|${{ needs.test-frontend.outputs.duration || '0' }}" \
            "Deploy Infrastructure|$(map_status "${{ needs.deploy-infrastructure.result }}")|${{ needs.deploy-infrastructure.outputs.duration || '0' }}" \
            "Deploy RAG Ingestion|$(map_status "${{ needs.deploy-rag-ingestion.result }}")|${{ needs.deploy-rag-ingestion.outputs.duration || '0' }}" \
            "Deploy Inference API|$(map_status "${{ needs.deploy-inference-api.result }}")|${{ needs.deploy-inference-api.outputs.duration || '0' }}" \
            "Deploy App API|$(map_status "${{ needs.deploy-app-api.result }}")|${{ needs.deploy-app-api.outputs.duration || '0' }}" \
            "Deploy Frontend|$(map_status "${{ needs.deploy-frontend.result }}")|${{ needs.deploy-frontend.outputs.duration || '0' }}" \
            "Deploy Gateway|$(map_status "${{ needs.deploy-gateway.result }}")|${{ needs.deploy-gateway.outputs.duration || '0' }}" \
            "Smoke Test|$(map_status "${{ needs.smoke-test.result }}")|${{ needs.smoke-test.outputs.duration || '0' }}" \
            "Teardown|$(map_status "${{ needs.teardown.result }}")|${{ needs.teardown.outputs.duration || '0' }}" \
            "Coverage Analysis|$(map_status "${{ needs.analyze-coverage.result }}")|${{ needs.analyze-coverage.outputs.duration || '0' }}" \
            "AI Coverage Analysis|$(map_status "${{ needs.ai-coverage-analysis.result }}")|${{ needs.ai-coverage-analysis.outputs.duration || '0' }}" \
            "[MV] Deploy Infrastructure (main)|$(map_status "${{ needs.mv-deploy-infrastructure.result }}")|${{ needs.mv-deploy-infrastructure.outputs.duration || '0' }}" \
            "[MV] Deploy RAG Ingestion (main)|$(map_status "${{ needs.mv-main-rag-ingestion.result }}")|${{ needs.mv-main-rag-ingestion.outputs.duration || '0' }}" \
            "[MV] Deploy Inference API (main)|$(map_status "${{ needs.mv-main-inference-api.result }}")|${{ needs.mv-main-inference-api.outputs.duration || '0' }}" \
            "[MV] Deploy App API (main)|$(map_status "${{ needs.mv-main-app-api.result }}")|${{ needs.mv-main-app-api.outputs.duration || '0' }}" \
            "[MV] Deploy Frontend (main)|$(map_status "${{ needs.mv-main-frontend.result }}")|${{ needs.mv-main-frontend.outputs.duration || '0' }}" \
            "[MV] Deploy Gateway (main)|$(map_status "${{ needs.mv-main-gateway.result }}")|${{ needs.mv-main-gateway.outputs.duration || '0' }}" \
            "[MV] Deploy Infrastructure (develop)|$(map_status "${{ needs.mv-deploy-infrastructure-develop.result }}")|${{ needs.mv-deploy-infrastructure-develop.outputs.duration || '0' }}" \
            "[MV] Deploy RAG Ingestion (develop)|$(map_status "${{ needs.mv-deploy-rag-ingestion.result }}")|${{ needs.mv-deploy-rag-ingestion.outputs.duration || '0' }}" \
            "[MV] Deploy Inference API (develop)|$(map_status "${{ needs.mv-deploy-inference-api.result }}")|${{ needs.mv-deploy-inference-api.outputs.duration || '0' }}" \
            "[MV] Deploy App API (develop)|$(map_status "${{ needs.mv-deploy-app-api.result }}")|${{ needs.mv-deploy-app-api.outputs.duration || '0' }}" \
            "[MV] Deploy Frontend (develop)|$(map_status "${{ needs.mv-deploy-frontend.result }}")|${{ needs.mv-deploy-frontend.outputs.duration || '0' }}" \
            "[MV] Deploy Gateway (develop)|$(map_status "${{ needs.mv-deploy-gateway.result }}")|${{ needs.mv-deploy-gateway.outputs.duration || '0' }}" \
            "[MV] Smoke Test|$(map_status "${{ needs.mv-smoke-test.result }}")|${{ needs.mv-smoke-test.outputs.duration || '0' }}" \
            "[MV] Teardown|$(map_status "${{ needs.mv-teardown.result }}")|${{ needs.mv-teardown.outputs.duration || '0' }}"
