name: "Nightly Build & Test"

on:
  schedule:
    # Run at 2 AM Mountain Time (9 AM UTC) every day
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      skip_deployment:
        description: 'Skip deployment and smoke tests'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      skip_teardown:
        description: 'Skip teardown (leave resources deployed)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CDK_REQUIRE_APPROVAL: never
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NIGHTLY_REF: develop
  # Suppress repeated config dumps from load-env.sh in CI logs
  LOAD_ENV_QUIET: true

concurrency:
  group: nightly-build
  cancel-in-progress: false

jobs:
  guard:
    name: Fork Guard
    runs-on: ubuntu-latest
    # Skip entire nightly on forks — set NIGHTLY_ENABLED=true in your repo variables
    if: vars.NIGHTLY_ENABLED == 'true'
    steps:
      - run: echo "Nightly enabled"

  check-stack-dependencies:
    name: Check Stack Dependencies
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Run stack dependency tests
        run: |
          bash scripts/common/test-stack-dependencies.sh

  install-backend:
    name: Install Backend Dependencies
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Restore Python packages cache
        id: cache-backend
        uses: actions/cache/restore@v5
        with:
          path: ~/.local/lib/python3.*/site-packages
          key: python-packages-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install Python dependencies
        if: steps.cache-backend.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e "backend/.[agentcore,dev]"

      - name: Save Python packages cache
        if: steps.cache-backend.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.local/lib/python3.*/site-packages
          key: python-packages-${{ hashFiles('backend/pyproject.toml') }}

  install-frontend:
    name: Install Frontend Dependencies
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Restore frontend node_modules cache
        id: cache-frontend
        uses: actions/cache/restore@v5
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

      - name: Install system dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: bash scripts/common/install-deps.sh

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: bash scripts/stack-frontend/install.sh

      - name: Save frontend node_modules cache
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

  install-infrastructure:
    name: Install Infrastructure Dependencies
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Restore infrastructure node_modules cache
        id: cache-infrastructure
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Install system dependencies
        if: steps.cache-infrastructure.outputs.cache-hit != 'true'
        run: bash scripts/common/install-deps.sh

      - name: Install CDK dependencies
        if: steps.cache-infrastructure.outputs.cache-hit != 'true'
        run: bash scripts/stack-infrastructure/install.sh

      - name: Save infrastructure node_modules cache
        if: steps.cache-infrastructure.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

  test-backend:
    name: Test Backend with Coverage
    runs-on: ubuntu-latest
    needs: install-backend
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Restore Python packages cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.local/lib/python3.*/site-packages
          key: python-packages-${{ hashFiles('backend/pyproject.toml') }}

      - name: Run backend tests with coverage
        id: run-tests
        run: bash scripts/stack-app-api/test.sh

      - name: Upload backend coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage
          path: |
            backend/coverage.json
            backend/htmlcov/
          retention-days: 30

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  test-frontend:
    name: Test Frontend with Coverage
    runs-on: ubuntu-latest
    needs: install-frontend
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Restore frontend node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

      - name: Run frontend tests with coverage
        id: run-tests
        run: bash scripts/stack-frontend/test.sh

      - name: Upload frontend coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage
          path: frontend/ai.client/coverage/
          retention-days: 30

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  deploy-infrastructure:
    name: Deploy Infrastructure (Nightly)
    runs-on: ubuntu-latest
    needs: [install-infrastructure, check-stack-dependencies]
    if: ${{ github.event.inputs.skip_deployment != 'true' }}
    environment: development
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    permissions:
      id-token: write
      contents: read
    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: nightly-agentcore
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_DOMAIN_NAME: ""
      CDK_HOSTED_ZONE_DOMAIN: ${{ vars.CDK_HOSTED_ZONE_DOMAIN }}
      CDK_ALB_SUBDOMAIN: nightly-api
      CDK_CERTIFICATE_ARN: ${{ vars.CDK_CERTIFICATE_ARN }}
      CDK_RETAIN_DATA_ON_DELETE: false
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Restore infrastructure node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-NightlyInfrastructure
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: bash scripts/common/install-deps.sh

      - name: Deploy infrastructure stack
        run: bash scripts/stack-infrastructure/deploy.sh

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  # ── Merge Validation Track ────────────────────────────────────────────────
  # Deploys main first, then overlays develop on top — simulating a real merge.
  # Runs in parallel with the standard develop-only track above.

  mv-deploy-infrastructure:
    name: "[MV] Deploy Infrastructure (main)"
    runs-on: ubuntu-latest
    needs: [install-infrastructure, check-stack-dependencies]
    if: ${{ github.event.inputs.skip_deployment != 'true' }}
    environment: development
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    permissions:
      id-token: write
      contents: read
    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: nightly-mv
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_DOMAIN_NAME: ""
      CDK_HOSTED_ZONE_DOMAIN: ${{ vars.CDK_HOSTED_ZONE_DOMAIN }}
      CDK_ALB_SUBDOMAIN: nightly-mv-api
      CDK_CERTIFICATE_ARN: ${{ vars.CDK_CERTIFICATE_ARN }}
      CDK_RETAIN_DATA_ON_DELETE: false
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Restore infrastructure node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-MVInfrastructure
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: bash scripts/common/install-deps.sh

      - name: Deploy infrastructure stack
        run: bash scripts/stack-infrastructure/deploy.sh

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  deploy-app-api:
    name: Deploy App API (Nightly)
    runs-on: ubuntu-latest
    needs: deploy-inference-api
    if: ${{ github.event.inputs.skip_deployment != 'true' }}
    environment: development
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    permissions:
      id-token: write
      contents: read
    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: nightly-agentcore
      CDK_APP_API_ENABLED: true
      CDK_APP_API_CPU: 512
      CDK_APP_API_MEMORY: 1024
      CDK_APP_API_DESIRED_COUNT: 1
      CDK_APP_API_MAX_CAPACITY: 2
      CDK_RETAIN_DATA_ON_DELETE: false
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Restore infrastructure node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-NightlyAppApi
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: bash scripts/common/install-deps.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          docker build \
            -f backend/Dockerfile.app-api \
            -t ${CDK_PROJECT_PREFIX}-app-api:${IMAGE_TAG} \
            .

      - name: Push to ECR
        run: bash scripts/stack-app-api/push-to-ecr.sh

      - name: Build and deploy App API
        run: bash scripts/stack-app-api/deploy.sh

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  deploy-inference-api:
    name: Deploy Inference API (Nightly)
    runs-on: ubuntu-24.04-arm
    needs: deploy-rag-ingestion
    if: ${{ github.event.inputs.skip_deployment != 'true' }}
    environment: development
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    permissions:
      id-token: write
      contents: read
    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: nightly-agentcore
      CDK_INFERENCE_API_ENABLED: true
      CDK_INFERENCE_API_CPU: 1024
      CDK_INFERENCE_API_MEMORY: 2048
      CDK_INFERENCE_API_DESIRED_COUNT: 1
      CDK_INFERENCE_API_MAX_CAPACITY: 2
      CDK_RETAIN_DATA_ON_DELETE: false
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Restore infrastructure node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-NightlyInferenceApi
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: bash scripts/common/install-deps.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          docker build \
            -f backend/Dockerfile.inference-api \
            --platform linux/arm64 \
            --build-arg APP_VERSION=$(tr -d '[:space:]' < VERSION) \
            -t ${CDK_PROJECT_PREFIX}-inference-api:${IMAGE_TAG} \
            .

      - name: Push to ECR
        run: bash scripts/stack-inference-api/push-to-ecr.sh

      - name: Build and deploy Inference API
        run: bash scripts/stack-inference-api/deploy.sh

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  deploy-rag-ingestion:
    name: Deploy RAG Ingestion (Nightly)
    runs-on: ubuntu-24.04-arm
    needs: deploy-infrastructure
    if: ${{ github.event.inputs.skip_deployment != 'true' }}
    environment: development
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    permissions:
      id-token: write
      contents: read
    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: nightly-agentcore
      CDK_RETAIN_DATA_ON_DELETE: false
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Restore infrastructure node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-NightlyRagIngestion
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: bash scripts/common/install-deps.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          docker build \
            -f backend/Dockerfile.rag-ingestion \
            --platform linux/arm64 \
            --build-arg APP_VERSION=$(tr -d '[:space:]' < VERSION) \
            -t ${CDK_PROJECT_PREFIX}-rag-ingestion:${IMAGE_TAG} \
            .

      - name: Push to ECR
        run: bash scripts/stack-rag-ingestion/push-to-ecr.sh

      - name: Deploy RAG Ingestion
        run: bash scripts/stack-rag-ingestion/deploy.sh

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend (Nightly)
    runs-on: ubuntu-latest
    needs: [deploy-app-api]
    if: ${{ github.event.inputs.skip_deployment != 'true' }}
    environment: development
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    permissions:
      id-token: write
      contents: read
    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: nightly-agentcore
      CDK_PRODUCTION: false
      CDK_FRONTEND_ENABLED: true
      CDK_RETAIN_DATA_ON_DELETE: false
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_DOMAIN_NAME: ""
      CDK_HOSTED_ZONE_DOMAIN: ""
      CDK_FRONTEND_CERTIFICATE_ARN: ""
      CDK_FRONTEND_BUCKET_NAME: ""
      CDK_FRONTEND_CLOUDFRONT_PRICE_CLASS: ""
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Restore frontend build cache
        id: cache-frontend-build
        uses: actions/cache/restore@v5
        with:
          path: frontend/ai.client/dist
          key: frontend-build-${{ hashFiles('frontend/ai.client/src/**', 'frontend/ai.client/angular.json', 'frontend/ai.client/tsconfig.json') }}

      - name: Install frontend dependencies
        if: steps.cache-frontend-build.outputs.cache-hit != 'true'
        run: bash scripts/stack-frontend/install.sh

      - name: Build frontend (cache miss)
        if: steps.cache-frontend-build.outputs.cache-hit != 'true'
        run: bash scripts/stack-frontend/build.sh

      - name: Restore infrastructure node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-NightlyFrontend
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: bash scripts/common/install-deps.sh

      - name: Deploy CDK infrastructure
        run: bash scripts/stack-frontend/deploy-cdk.sh

      - name: Deploy assets
        run: bash scripts/stack-frontend/deploy-assets.sh

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  deploy-gateway:
    name: Deploy Gateway (Nightly)
    runs-on: ubuntu-latest
    needs: deploy-app-api
    if: ${{ github.event.inputs.skip_deployment != 'true' }}
    environment: development
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    permissions:
      id-token: write
      contents: read
    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: nightly-agentcore
      CDK_GATEWAY_ENABLED: true
      CDK_RETAIN_DATA_ON_DELETE: false
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.NIGHTLY_REF }}

      - name: Restore infrastructure node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Configure AWS credentials
