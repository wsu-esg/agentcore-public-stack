# ── Nightly Build & Test ─────────────────────────────────────────────────────
#
# Track vocabulary (comma-separated in NIGHTLY_TRACKS variable or workflow_dispatch tracks input):
#
#   test-backend-<branch>              Run backend tests against <branch>
#   test-frontend-<branch>             Run frontend tests against <branch>
#   deploy-<branch>                    Deploy full stack from <branch>
#   merge-validation:<base>:<overlay>  Deploy <base>, then overlay <overlay>
#   scan-images-<branch>               Scan Docker images from <branch> for vulnerabilities
#   all                                Run all tracks with default branches
#                                      (tests + deploy on develop, MV main→develop)
#
# Examples:
#   test-backend-develop
#   test-frontend-main,test-backend-main
#   deploy-develop
#   deploy-main,deploy-develop
#   merge-validation:main:develop
#   merge-validation:main:feature/my-branch
#   test-backend-develop,deploy-develop,merge-validation:main:develop
#   all
#
# Fork safety: If NIGHTLY_TRACKS is not set (empty), NO tracks run.
# Scheduled runs read the NIGHTLY_TRACKS repo variable.
# workflow_dispatch always uses the 'tracks' input, ignoring the variable.
# ─────────────────────────────────────────────────────────────────────────────

name: "Nightly Build & Test"

on:
  schedule:
    # Run at 2 AM Mountain Time (9 AM UTC) every day
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      tracks:
        description: 'Comma-separated tracks to run (see workflow comments for vocabulary). Default: all'
        required: false
        default: 'all'
        type: string
      skip_teardown:
        description: 'Skip teardown (leave resources deployed)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

env:
  CDK_REQUIRE_APPROVAL: never
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LOAD_ENV_QUIET: true

concurrency:
  group: nightly-build
  cancel-in-progress: false

jobs:

  # ── Track Resolution ──────────────────────────────────────────────────────
  # Parses the tracks string into boolean flags and branch refs for downstream jobs.

  resolve-tracks:
    name: Resolve Tracks
    runs-on: ubuntu-24.04
    outputs:
      run_test_backend: ${{ steps.resolve.outputs.run_test_backend }}
      test_backend_ref: ${{ steps.resolve.outputs.test_backend_ref }}
      run_test_frontend: ${{ steps.resolve.outputs.run_test_frontend }}
      test_frontend_ref: ${{ steps.resolve.outputs.test_frontend_ref }}
      run_deploy: ${{ steps.resolve.outputs.run_deploy }}
      deploy_ref: ${{ steps.resolve.outputs.deploy_ref }}
      run_mv: ${{ steps.resolve.outputs.run_mv }}
      mv_base_ref: ${{ steps.resolve.outputs.mv_base_ref }}
      mv_overlay_ref: ${{ steps.resolve.outputs.mv_overlay_ref }}
      run_scan_images: ${{ steps.resolve.outputs.run_scan_images }}
      scan_images_ref: ${{ steps.resolve.outputs.scan_images_ref }}
      any_track: ${{ steps.resolve.outputs.any_track }}
    steps:
      - name: Parse tracks
        id: resolve
        run: |
          # Source: workflow_dispatch input takes priority; schedule uses repo variable
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRACKS="${{ github.event.inputs.tracks }}"
          else
            TRACKS="${{ vars.NIGHTLY_TRACKS }}"
          fi

          # Defaults — all false/empty
          run_test_backend=false
          test_backend_ref=""
          run_test_frontend=false
          test_frontend_ref=""
          run_deploy=false
          deploy_ref=""
          run_mv=false
          mv_base_ref=""
          mv_overlay_ref=""
          run_scan_images=false
          scan_images_ref=""

          # Empty tracks = nothing runs (fork-safe default)
          if [ -z "$TRACKS" ]; then
            echo "No tracks specified — skipping all jobs"
          else
            # Parse comma-separated tokens
            IFS=',' read -ra TOKENS <<< "$TRACKS"
            for token in "${TOKENS[@]}"; do
              token="$(echo "$token" | xargs)"  # trim whitespace
              case "$token" in
                all)
                  run_test_backend=true
                  test_backend_ref="develop"
                  run_test_frontend=true
                  test_frontend_ref="develop"
                  run_deploy=true
                  deploy_ref="develop"
                  run_mv=true
                  mv_base_ref="main"
                  mv_overlay_ref="develop"
                  run_scan_images=true
                  scan_images_ref="develop"
                  ;;
                test-backend-*)
                  run_test_backend=true
                  test_backend_ref="${token#test-backend-}"
                  ;;
                test-frontend-*)
                  run_test_frontend=true
                  test_frontend_ref="${token#test-frontend-}"
                  ;;
                deploy-*)
                  run_deploy=true
                  deploy_ref="${token#deploy-}"
                  ;;
                merge-validation:*:*)
                  run_mv=true
                  mv_base_ref="$(echo "$token" | cut -d: -f2)"
                  mv_overlay_ref="$(echo "$token" | cut -d: -f3)"
                  ;;
                scan-images-*)
                  run_scan_images=true
                  scan_images_ref="${token#scan-images-}"
                  ;;
                *)
                  echo "::warning::Unknown track token: $token"
                  ;;
              esac
            done
          fi

          # Determine if any track is enabled
          any_track=false
          if [ "$run_test_backend" = "true" ] || [ "$run_test_frontend" = "true" ] || \
             [ "$run_deploy" = "true" ] || [ "$run_mv" = "true" ] || \
             [ "$run_scan_images" = "true" ]; then
            any_track=true
          fi

          # Write outputs
          {
            echo "run_test_backend=$run_test_backend"
            echo "test_backend_ref=$test_backend_ref"
            echo "run_test_frontend=$run_test_frontend"
            echo "test_frontend_ref=$test_frontend_ref"
            echo "run_deploy=$run_deploy"
            echo "deploy_ref=$deploy_ref"
            echo "run_mv=$run_mv"
            echo "mv_base_ref=$mv_base_ref"
            echo "mv_overlay_ref=$mv_overlay_ref"
            echo "run_scan_images=$run_scan_images"
            echo "scan_images_ref=$scan_images_ref"
            echo "any_track=$any_track"
          } >> "$GITHUB_OUTPUT"

          # Log for debugging
          echo "=== Resolved Tracks ==="
          echo "  test-backend:  $run_test_backend (ref: $test_backend_ref)"
          echo "  test-frontend: $run_test_frontend (ref: $test_frontend_ref)"
          echo "  deploy:        $run_deploy (ref: $deploy_ref)"
          echo "  mv:            $run_mv (base: $mv_base_ref, overlay: $mv_overlay_ref)"
          echo "  scan-images:   $run_scan_images (ref: $scan_images_ref)"
          echo "  any_track:     $any_track"

  # ── Test Tracks ───────────────────────────────────────────────────────────

  install-backend:
    name: Install Backend Dependencies
    needs: resolve-tracks
    if: needs.resolve-tracks.outputs.run_test_backend == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tracks.outputs.test_backend_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Restore Python packages cache
        id: cache-backend
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/uv
            backend/.venv
          key: uv-packages-${{ hashFiles('backend/uv.lock') }}

      - name: Install Python dependencies
        if: steps.cache-backend.outputs.cache-hit != 'true'
        run: |
          curl -LsSf https://astral.sh/uv/0.7.12/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          cd backend
          uv sync --frozen --extra agentcore --extra dev

      - name: Save Python packages cache
        if: steps.cache-backend.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/uv
            backend/.venv
          key: uv-packages-${{ hashFiles('backend/uv.lock') }}

  install-frontend:
    name: Install Frontend Dependencies
    needs: resolve-tracks
    if: needs.resolve-tracks.outputs.run_test_frontend == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tracks.outputs.test_frontend_ref }}

      - name: Restore frontend node_modules cache
        id: cache-frontend
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

      - name: Install system dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: bash scripts/common/install-deps.sh

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: bash scripts/stack-frontend/install.sh

      - name: Save frontend node_modules cache
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

  test-backend:
    name: Test Backend with Coverage
    runs-on: ubuntu-24.04
    needs: [resolve-tracks, install-backend]
    if: needs.resolve-tracks.outputs.run_test_backend == 'true'
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tracks.outputs.test_backend_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Restore Python packages cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/uv
            backend/.venv
          key: uv-packages-${{ hashFiles('backend/uv.lock') }}

      - name: Run backend tests with coverage
        id: run-tests
        run: bash scripts/stack-app-api/test.sh

      - name: Upload backend coverage artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: backend-coverage
          path: |
            backend/coverage.json
            backend/htmlcov/
          retention-days: 30

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  test-frontend:
    name: Test Frontend with Coverage
    runs-on: ubuntu-24.04
    needs: [resolve-tracks, install-frontend]
    if: needs.resolve-tracks.outputs.run_test_frontend == 'true'
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tracks.outputs.test_frontend_ref }}

      - name: Restore frontend node_modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: frontend/ai.client/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/ai.client/package-lock.json') }}

      - name: Run frontend tests with coverage
        id: run-tests
        run: bash scripts/stack-frontend/test.sh

      - name: Upload frontend coverage artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: frontend-coverage
          path: frontend/ai.client/coverage/
          retention-days: 30

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  # ── Coverage Analysis ─────────────────────────────────────────────────────

  analyze-coverage:
    name: Analyze Coverage Changes
    runs-on: ubuntu-24.04
    needs: [resolve-tracks, test-backend, test-frontend]
    if: >-
      always() &&
      (needs.test-backend.result == 'success' || needs.test-frontend.result == 'success')
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tracks.outputs.test_backend_ref || needs.resolve-tracks.outputs.test_frontend_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Download backend coverage
        if: needs.test-backend.result == 'success'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: backend-coverage
          path: backend/

      - name: Download frontend coverage
        if: needs.test-frontend.result == 'success'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: frontend-coverage
          path: frontend/ai.client/coverage/

      - name: Run coverage comparison
        id: run-analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/nightly/compare-coverage.py

      - name: Upload coverage comparison report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-comparison
          path: coverage-comparison.json
          retention-days: 30

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ steps.run-analysis.outcome }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  ai-coverage-analysis:
    name: AI Coverage Gap Analysis
    runs-on: ubuntu-24.04
    needs: [resolve-tracks, analyze-coverage]
    if: >-
      always() && needs.analyze-coverage.result == 'success'
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tracks.outputs.test_backend_ref || needs.resolve-tracks.outputs.test_frontend_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Download coverage comparison report
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-comparison
          path: .

      - name: Run AI coverage analysis
        id: run-ai-analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/nightly/ai-coverage-analysis.py

      - name: Generate summary
        id: summary
        if: always()
        run: |
          if [ "${{ steps.run-ai-analysis.outcome }}" = "success" ]; then STATUS="success"; else STATUS="failure"; fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  # ── Deploy Track ──────────────────────────────────────────────────────────

  deploy:
    needs: resolve-tracks
    if: needs.resolve-tracks.outputs.run_deploy == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/nightly-deploy-pipeline.yml
    with:
      ref: ${{ needs.resolve-tracks.outputs.deploy_ref }}
      project-prefix: nightly-${{ needs.resolve-tracks.outputs.deploy_ref }}
      alb-subdomain: nightly-${{ needs.resolve-tracks.outputs.deploy_ref }}-api
      skip-teardown: ${{ github.event.inputs.skip_teardown || 'false' }}
      label: deploy-${{ needs.resolve-tracks.outputs.deploy_ref }}
    secrets: inherit

  # ── Merge Validation Track ────────────────────────────────────────────────
  # Deploys base branch first, then overlays the overlay branch on top —
  # simulating a real merge to catch CDK/infra incompatibilities.

  mv-base:
    needs: resolve-tracks
    if: needs.resolve-tracks.outputs.run_mv == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/nightly-deploy-pipeline.yml
    with:
      ref: ${{ needs.resolve-tracks.outputs.mv_base_ref }}
      project-prefix: nightly-mv
      alb-subdomain: nightly-mv-api
      skip-teardown: 'true'
      label: MV-base-${{ needs.resolve-tracks.outputs.mv_base_ref }}
      source-project-prefix: dev-boisestateai-v2
    secrets: inherit

  mv-overlay:
    needs: [resolve-tracks, mv-base]
    if: needs.resolve-tracks.outputs.run_mv == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/nightly-deploy-pipeline.yml
    with:
      ref: ${{ needs.resolve-tracks.outputs.mv_overlay_ref }}
      project-prefix: nightly-mv
      alb-subdomain: nightly-mv-api
      skip-teardown: ${{ github.event.inputs.skip_teardown || 'false' }}
      label: MV-overlay-${{ needs.resolve-tracks.outputs.mv_overlay_ref }}
    secrets: inherit

  # ── Image Scanning Track ──────────────────────────────────────────────────

  scan-images:
    name: Scan Docker Images
    runs-on: ubuntu-24.04
    needs: resolve-tracks
    if: needs.resolve-tracks.outputs.run_scan_images == 'true'
    outputs:
      status: ${{ steps.summary.outputs.status }}
      duration: ${{ steps.summary.outputs.duration }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tracks.outputs.scan_images_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build app-api image
        run: docker build -f backend/Dockerfile.app-api -t app-api:scan .

      - name: Build inference-api image
        run: docker build -f backend/Dockerfile.inference-api -t inference-api:scan .

      - name: Build rag-ingestion image
        run: docker build -f backend/Dockerfile.rag-ingestion -t rag-ingestion:scan .

      - name: Trivy scan app-api
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7f3b01b8e110e21 # v0.28.0
        with:
          image-ref: 'app-api:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          output: trivy-app-api.txt

      - name: Trivy scan inference-api
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7f3b01b8e110e21 # v0.28.0
        with:
          image-ref: 'inference-api:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          output: trivy-inference-api.txt

      - name: Trivy scan rag-ingestion
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7f3b01b8e110e21 # v0.28.0
        with:
          image-ref: 'rag-ingestion:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          output: trivy-rag-ingestion.txt

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: trivy-scan-reports
          path: trivy-*.txt
          retention-days: 30

      - name: Generate summary
        id: summary
        if: always()
        run: |
          echo "## Docker Image Scan Results" >> "$GITHUB_STEP_SUMMARY"
          for report in trivy-*.txt; do
            image_name=$(basename "$report" .txt | sed 's/trivy-//')
            echo "### $image_name" >> "$GITHUB_STEP_SUMMARY"
            if [ -f "$report" ] && [ -s "$report" ]; then
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat "$report" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No vulnerabilities found." >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "duration=$SECONDS" >> "$GITHUB_OUTPUT"

  # ── Summary ───────────────────────────────────────────────────────────────

  summary:
    name: Nightly Summary
    runs-on: ubuntu-24.04
    needs: [resolve-tracks, test-backend, test-frontend, analyze-coverage, ai-coverage-analysis, deploy, mv-base, mv-overlay, scan-images]
    if: always() && needs.resolve-tracks.outputs.any_track == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-tracks.outputs.test_backend_ref || needs.resolve-tracks.outputs.deploy_ref || needs.resolve-tracks.outputs.mv_overlay_ref || 'develop' }}

      - name: Generate nightly summary
        env:
          RUN_TEST_BACKEND: ${{ needs.resolve-tracks.outputs.run_test_backend }}
          RUN_TEST_FRONTEND: ${{ needs.resolve-tracks.outputs.run_test_frontend }}
          RUN_DEPLOY: ${{ needs.resolve-tracks.outputs.run_deploy }}
          RUN_MV: ${{ needs.resolve-tracks.outputs.run_mv }}
          RUN_SCAN_IMAGES: ${{ needs.resolve-tracks.outputs.run_scan_images }}
          DEPLOY_REF: ${{ needs.resolve-tracks.outputs.deploy_ref }}
          MV_BASE_REF: ${{ needs.resolve-tracks.outputs.mv_base_ref }}
          MV_OVERLAY_REF: ${{ needs.resolve-tracks.outputs.mv_overlay_ref }}
        run: |
          source scripts/common/summary.sh

          # Determine aggregate status from enabled tracks only
          AGGREGATE="success"
          map_status() {
            case "$1" in
              success) echo "success" ;;
              failure) echo "failure" ;;
              skipped|cancelled|"") echo "skipped" ;;
              *) echo "skipped" ;;
            esac
          }

          ROWS=()

          # Test tracks
          if [ "$RUN_TEST_BACKEND" = "true" ]; then
            status="$(map_status "${{ needs.test-backend.result }}")"
            ROWS+=("Test Backend|${status}|${{ needs.test-backend.outputs.duration || '0' }}")
            [ "$status" = "failure" ] && AGGREGATE="failure"
          fi
          if [ "$RUN_TEST_FRONTEND" = "true" ]; then
            status="$(map_status "${{ needs.test-frontend.result }}")"
            ROWS+=("Test Frontend|${status}|${{ needs.test-frontend.outputs.duration || '0' }}")
            [ "$status" = "failure" ] && AGGREGATE="failure"
          fi

          # Coverage (runs if any test track succeeded)
          if [ "$RUN_TEST_BACKEND" = "true" ] || [ "$RUN_TEST_FRONTEND" = "true" ]; then
            status="$(map_status "${{ needs.analyze-coverage.result }}")"
            ROWS+=("Coverage Analysis|${status}|${{ needs.analyze-coverage.outputs.duration || '0' }}")
            [ "$status" = "failure" ] && [ "$AGGREGATE" != "failure" ] && AGGREGATE="partial"

            status="$(map_status "${{ needs.ai-coverage-analysis.result }}")"
            ROWS+=("AI Coverage Analysis|${status}|${{ needs.ai-coverage-analysis.outputs.duration || '0' }}")
            [ "$status" = "failure" ] && [ "$AGGREGATE" != "failure" ] && AGGREGATE="partial"
          fi

          # Deploy track (reusable workflow — single aggregate result)
          if [ "$RUN_DEPLOY" = "true" ]; then
            status="$(map_status "${{ needs.deploy.result }}")"
            ROWS+=("Deploy Pipeline (${DEPLOY_REF})|${status}|0")
            [ "$status" = "failure" ] && AGGREGATE="failure"
          fi

          # MV tracks
          if [ "$RUN_MV" = "true" ]; then
            status="$(map_status "${{ needs.mv-base.result }}")"
            ROWS+=("[MV] Base (${MV_BASE_REF})|${status}|0")
            [ "$status" = "failure" ] && AGGREGATE="failure"

            status="$(map_status "${{ needs.mv-overlay.result }}")"
            ROWS+=("[MV] Overlay (${MV_OVERLAY_REF})|${status}|0")
            [ "$status" = "failure" ] && AGGREGATE="failure"
          fi

          # Image scan track
          if [ "$RUN_SCAN_IMAGES" = "true" ]; then
            status="$(map_status "${{ needs.scan-images.result }}")"
            ROWS+=("Image Scan|${status}|${{ needs.scan-images.outputs.duration || '0' }}")
            [ "$status" = "failure" ] && [ "$AGGREGATE" != "failure" ] && AGGREGATE="partial"
          fi

          write_workflow_header "Nightly Build & Test" "$AGGREGATE"
          write_nightly_summary "${ROWS[@]}"
