name: "Version Check"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Suppress repeated config dumps from load-env.sh in CI logs
  LOAD_ENV_QUIET: true

on:
  pull_request:
    branches:
      - main

jobs:
  version-check:
    name: Version Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch main branch
        run: |
          git fetch origin main

      - name: Check version was bumped
        id: version-bumped
        continue-on-error: true
        run: |
          DIFF=$(git diff origin/main -- VERSION)
          if [ -z "${DIFF}" ]; then
            echo "::error::VERSION file has not been updated. Bump the version before merging to main."
            exit 1
          fi
          echo "VERSION file has been updated."

      - name: Check manifests are in sync
        id: manifests-synced
        continue-on-error: true
        run: |
          bash scripts/common/sync-version.sh --check

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'

      - name: Check package-lock.json files are in sync
        id: lockfiles-synced
        continue-on-error: true
        run: |
          FAILED=0

          for dir in frontend/ai.client infrastructure; do
            echo "Checking ${dir}/package-lock.json..."
            npm install --package-lock-only --prefix "${dir}" 2>/dev/null
            if ! git diff --exit-code "${dir}/package-lock.json" > /dev/null 2>&1; then
              echo "::error::${dir}/package-lock.json is out of sync with ${dir}/package.json"
              FAILED=1
            else
              echo "${dir}/package-lock.json is in sync."
            fi
          done

          if [ "${FAILED}" -eq 1 ]; then
            exit 1
          fi

      - name: Evaluate results
        run: |
          FAILED=0

          if [ "${{ steps.version-bumped.outcome }}" = "failure" ]; then
            echo "::error::VERSION file has not been updated. Bump the version before merging to main."
            FAILED=1
          fi

          if [ "${{ steps.manifests-synced.outcome }}" = "failure" ]; then
            echo "::error::Package manifests are out of sync with VERSION. Run \`bash scripts/common/sync-version.sh\` and commit."
            FAILED=1
          fi

          if [ "${{ steps.lockfiles-synced.outcome }}" = "failure" ]; then
            echo "::error::package-lock.json files are out of sync. Run \`bash scripts/common/sync-version.sh\` and commit the updated lockfiles."
            FAILED=1
          fi

          if [ "${FAILED}" -eq 1 ]; then
            exit 1
          fi

          echo "All version checks passed."

      - name: Generate summary
        if: always()
        run: |
          source scripts/common/summary.sh

          # Map step outcomes to pass/fail
          VB_RESULT="${{ steps.version-bumped.outcome }}"
          MS_RESULT="${{ steps.manifests-synced.outcome }}"
          LF_RESULT="${{ steps.lockfiles-synced.outcome }}"

          if [ "${VB_RESULT}" = "success" ]; then VB_STATUS="pass"; else VB_STATUS="fail"; fi
          if [ "${MS_RESULT}" = "success" ]; then MS_STATUS="pass"; else MS_STATUS="fail"; fi
          if [ "${LF_RESULT}" = "success" ]; then LF_STATUS="pass"; else LF_STATUS="fail"; fi

          # Determine overall status
          if [ "${VB_STATUS}" = "pass" ] && [ "${MS_STATUS}" = "pass" ] && [ "${LF_STATUS}" = "pass" ]; then
            STATUS="success"
          elif [ "${VB_STATUS}" = "pass" ] || [ "${MS_STATUS}" = "pass" ] || [ "${LF_STATUS}" = "pass" ]; then
            STATUS="partial"
          else
            STATUS="failure"
          fi

          # Extract old version from main and new version from PR branch
          OLD_VERSION="$(git show origin/main:VERSION 2>/dev/null | tr -d '[:space:]' || echo "unknown")"
          NEW_VERSION="$(tr -d '[:space:]' < VERSION || echo "unknown")"

          write_workflow_header "Version Check" "${STATUS}"
          write_version_check_summary "${VB_STATUS}" "${MS_STATUS}" "${LF_STATUS}" "${OLD_VERSION}" "${NEW_VERSION}"
