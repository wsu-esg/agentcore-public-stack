<div class="min-h-dvh">
  <div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
    <!-- Header -->
    <div class="mb-10">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white sm:text-3xl">
            Assistants
          </h1>
          <p class="mt-1.5 text-sm text-gray-500 dark:text-gray-400">
            Build custom chat experiences backed by your documents.
          </p>
        </div>

        <button
          type="button"
          (click)="onCreateNew()"
          [disabled]="loading()"
          class="group relative inline-flex items-center gap-2 rounded-lg bg-primary-500 px-4 py-2.5 text-sm font-semibold text-white shadow-xs transition-all duration-200 hover:bg-primary-600 hover:shadow-sm focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500 focus-visible:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.98] dark:focus-visible:ring-offset-gray-900"
        >
          <svg class="size-4 transition-transform duration-200 group-hover:rotate-90" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          {{ loading() ? 'Creating...' : 'New Assistant' }}
        </button>
      </div>
    </div>

    <!-- Content -->
    <main>
      @if (loading()) {
        <!-- Loading skeleton grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
          @for (i of [1, 2, 3]; track i) {
            <div class="rounded-xl border border-gray-200/80 bg-white overflow-hidden dark:border-gray-700/60 dark:bg-gray-800/80 animate-pulse">
              <div class="h-28 bg-gray-100 dark:bg-gray-700/50"></div>
              <div class="p-5 space-y-3">
                <div class="h-4 w-2/3 rounded bg-gray-200 dark:bg-gray-700"></div>
                <div class="h-3 w-full rounded bg-gray-100 dark:bg-gray-700/50"></div>
                <div class="h-3 w-4/5 rounded bg-gray-100 dark:bg-gray-700/50"></div>
              </div>
            </div>
          }
        </div>
      } @else if (error()) {
        <div class="flex flex-col items-center justify-center py-16 text-center">
          <div class="flex size-16 items-center justify-center rounded-2xl bg-red-50 dark:bg-red-900/20">
            <svg class="size-8 text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
            </svg>
          </div>
          <p class="mt-4 text-sm font-medium text-red-600 dark:text-red-400">{{ error() }}</p>
        </div>
      } @else {
        <app-assistant-list
          [assistants]="myAssistants()"
          (assistantSelected)="onAssistantSelected($event)"
          (chatRequested)="onChatRequested($event)"
          (shareRequested)="onShareRequested($event)"
          (makePublicRequested)="onMakePublicRequested($event)"
          (makePrivateRequested)="onMakePrivateRequested($event)"
          (deleteRequested)="onDeleteRequested($event)"
        />
      }
    </main>
  </div>
</div>
